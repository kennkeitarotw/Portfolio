<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kenn Keitaro | Finance & Strategy Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,400;1,700;1,900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505; --bg2: #080808; --bg3: #0a0a0a;
      --emerald: #10b981; --emerald-dark: #059669;
      --text: #E5E5E5;
      --zinc-400: #a1a1aa; --zinc-500: #71717a; --zinc-600: #52525b;
      --white5: rgba(255,255,255,0.05); --white10: rgba(255,255,255,0.1);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      border: 10px solid var(--bg3);
      background-image: linear-gradient(to right,rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,0.02) 1px,transparent 1px);
      background-size: 20px 20px;
    }
    ::selection { background: var(--emerald); color: #000; }
    a { text-decoration: none; color: inherit; }

    /* LANG SWITCHER */
    .lang-switcher {
      display: flex; align-items: center; gap: 2px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--white10); padding: 3px;
    }
    .lang-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem; font-weight: 700; letter-spacing: 0.1em;
      color: var(--zinc-600); background: transparent; border: none;
      padding: 0.3rem 0.65rem; cursor: pointer;
      transition: color 0.15s, background 0.15s; white-space: nowrap;
    }
    .lang-btn:hover { color: var(--zinc-400); }
    .lang-btn.active { background: var(--emerald); color: #000; }

    /* HEADER */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 3rem; border-bottom: 1px solid var(--white5);
      position: sticky; top: 0; background: rgba(5,5,5,0.95);
      backdrop-filter: blur(20px); z-index: 50; gap: 1rem; flex-wrap: wrap;
    }
    .header-brand h1 { font-size: 1rem; font-weight: 700; color: #fff; text-transform: uppercase; font-style: italic; letter-spacing: -0.05em; }
    .header-brand .status { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.15rem; }
    .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--emerald); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .status-text { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; color: var(--zinc-500); text-transform: uppercase; letter-spacing: 0.2em; }
    .header-right { display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; }
    nav { display: flex; gap: 2rem; }
    nav a { font-size: 0.5625rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--zinc-500); transition: color 0.2s; }
    nav a:hover { color: var(--emerald); }
    .btn-resume {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1.5rem; background: #fff; color: #000;
      font-size: 0.5625rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em;
      transition: box-shadow 0.2s, transform 0.1s; white-space: nowrap;
    }
    .btn-resume:hover { box-shadow: 0 0 30px rgba(16,185,129,0.2); }
    .btn-resume:active { transform: scale(0.97); }

    /* HERO */
    .hero { padding: 6rem 3rem; border-bottom: 1px solid var(--white5); }
    .hero h2 { font-size: clamp(2rem,5vw,4.5rem); font-weight: 700; color: #fff; line-height: 1.05; margin-bottom: 2rem; letter-spacing: -0.03em; }
    .hero h2 .muted { color: var(--zinc-600); font-style: italic; }
    .hero-meta { display: grid; grid-template-columns: repeat(3,1fr); gap: 3rem; }
    .hero-meta-item .label { font-family: 'JetBrains Mono', monospace; font-size: 0.5625rem; color: var(--zinc-600); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 0.35rem; }
    .hero-meta-item .value { font-size: 0.8125rem; color: #fff; }

    /* SNAPSHOT */
    .snapshot { display: grid; grid-template-columns: repeat(4,1fr); border-bottom: 1px solid var(--white5); }
    .snapshot-card { padding: 2rem; background: rgba(255,255,255,0.005); transition: background 0.2s; }
    .snapshot-card:hover { background: rgba(255,255,255,0.03); }
    .snapshot-card + .snapshot-card { border-left: 1px solid var(--white5); }
    .snapshot-card .tag { font-family: 'JetBrains Mono', monospace; font-size: 0.5rem; color: var(--emerald); text-transform: uppercase; letter-spacing: 0.2em; font-weight: 700; margin-bottom: 0.35rem; }
    .snapshot-card .big { font-size: 1.5rem; font-weight: 700; color: #fff; letter-spacing: -0.04em; }
    .snapshot-card .sub { font-size: 0.5625rem; color: var(--zinc-500); margin-top: 0.25rem; font-style: italic; }

    /* WHY HIRE */
    .why-hire { padding: 5rem 3rem; border-bottom: 1px solid var(--white5); background: var(--bg2); }
    .section-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 0.5625rem; font-weight: 900; color: var(--zinc-500); text-transform: uppercase; letter-spacing: 0.4em; margin-bottom: 2.5rem; }
    .why-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 2rem; }
    .why-item { border-left: 1px solid rgba(16,185,129,0.3); padding-left: 1.5rem; }
    .why-item h4 { color: #fff; font-weight: 700; font-size: 0.875rem; margin-bottom: 0.5rem; }
    .why-item p { color: var(--zinc-500); font-size: 0.75rem; line-height: 1.6; }

    /* EXPERIENCE */
    .experience { padding: 4rem 3rem; border-bottom: 1px solid var(--white5); }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; }
    .section-title { font-size: 0.75rem; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 0.4em; }
    .exp-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 2.5rem; }
    .exp-left { border-left: 2px solid var(--emerald); padding-left: 1.5rem; padding-top: 0.5rem; }
    .exp-left h3 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
    .exp-left .role { color: var(--emerald); font-weight: 700; font-size: 0.875rem; margin-bottom: 1rem; }
    .exp-left .period { font-family: 'JetBrains Mono', monospace; font-size: 0.5625rem; color: var(--zinc-600); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1rem; }
    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
    .tag-pill { font-size: 0.5rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--zinc-600); background: var(--white5); border: 1px solid var(--white10); padding: 0.2rem 0.5rem; }
    .exp-desc { color: var(--zinc-400); font-size: 1.0625rem; font-weight: 300; line-height: 1.6; margin-bottom: 2rem; }
    .impact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem 3rem; }
    .impact-item { display: flex; gap: 1rem; align-items: flex-start; }
    .impact-dot { width: 6px; height: 6px; background: var(--emerald); flex-shrink: 0; margin-top: 0.4rem; }
    .impact-item span { font-size: 0.875rem; color: #d4d4d8; line-height: 1.5; }

    /* PROJECTS */
    .projects { padding: 4rem 3rem; border-bottom: 1px solid var(--white5); }
    .projects-sub { color: var(--zinc-600); font-size: 0.75rem; margin-top: 0.5rem; }
    .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; margin-top: 2.5rem; }
    .project-card { border: 1px solid var(--white5); background: rgba(255,255,255,0.005); padding: 2.5rem; position: relative; overflow: hidden; display: block; transition: background 0.2s; }
    .project-card:hover { background: rgba(255,255,255,0.03); }
    .project-card:hover .project-arrow { opacity: 1; transform: translate(0,0); }
    .project-card:hover .project-title { color: var(--emerald); }
    .project-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2.5rem; }
    .project-icon { width: 48px; height: 48px; border: 1px solid var(--white10); display: flex; align-items: center; justify-content: center; color: var(--emerald); }
    .project-metric { text-align: right; }
    .project-metric .metric-val { font-size: 0.625rem; color: var(--emerald); font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; }
    .project-metric .metric-type { font-family: 'JetBrains Mono', monospace; font-size: 0.5rem; color: var(--zinc-600); text-transform: uppercase; letter-spacing: 0.2em; margin-top: 0.25rem; }
    .project-title { font-size: 1.875rem; font-weight: 700; color: #fff; margin-bottom: 1.5rem; text-transform: uppercase; font-style: italic; letter-spacing: -0.04em; transition: color 0.2s; }
    .project-desc { color: var(--zinc-400); font-size: 1rem; line-height: 1.6; margin-bottom: 2rem; }
    .project-footer { display: flex; gap: 1rem; flex-wrap: wrap; padding-top: 1.5rem; border-top: 1px solid var(--white5); }
    .project-tag { font-size: 0.5625rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.15em; color: var(--zinc-600); transition: color 0.2s; }
    .project-card:hover .project-tag { color: var(--emerald); }
    .project-arrow { position: absolute; bottom: 1.5rem; right: 1.5rem; opacity: 0; transform: translate(4px,4px); transition: opacity 0.2s, transform 0.2s; color: var(--emerald); }

    /* SKILLS + EDU */
    .bottom-grid { display: grid; grid-template-columns: 1fr 2fr; border-bottom: 1px solid var(--white5); }
    .edu-col { padding: 3rem; border-right: 1px solid var(--white5); background: var(--bg2); }
    .skills-col { padding: 3rem; }
    .edu-item { margin-bottom: 2.5rem; }
    .edu-period { font-family: 'JetBrains Mono', monospace; font-size: 0.5625rem; font-weight: 700; color: var(--zinc-600); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.5rem; }
    .edu-school { color: #fff; font-weight: 700; line-height: 1.3; margin-bottom: 0.25rem; }
    .edu-degree { color: var(--zinc-400); font-size: 0.875rem; font-style: italic; }
    .edu-gpa { color: var(--emerald); font-size: 0.625rem; font-weight: 700; text-transform: uppercase; margin-top: 0.5rem; }
    .edu-ach { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .edu-ach-item { display: flex; gap: 0.5rem; font-size: 0.625rem; color: var(--zinc-500); }
    .edu-ach-item span:first-child { color: var(--emerald); }
    .skills-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2.5rem; }
    .skill-num { width: 32px; height: 32px; border: 1px solid var(--white10); display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 0.625rem; color: var(--zinc-600); margin-bottom: 1rem; transition: border-color 0.2s, color 0.2s; }
    .skill-item:hover .skill-num { border-color: var(--emerald); color: var(--emerald); }
    .skill-label { color: #fff; font-weight: 700; font-size: 0.8125rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
    .skill-desc { color: var(--zinc-500); font-size: 0.75rem; line-height: 1.6; }

    /* CTA */
    .cta { padding: 5rem 3rem; background: #fff; color: #000; }
    .cta-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 0.625rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.6em; margin-bottom: 1.5rem; opacity: 0.4; font-style: italic; }
    .cta h2 { font-size: clamp(2.5rem,6vw,4.5rem); font-weight: 900; letter-spacing: -0.04em; line-height: 0.9; text-transform: uppercase; font-style: italic; margin-bottom: 2.5rem; }
    .cta h2 .accent { color: #059669; }
    .cta-contacts { display: grid; grid-template-columns: repeat(3,1fr); gap: 3rem; padding-top: 2.5rem; border-top: 1px solid rgba(0,0,0,0.05); margin-bottom: 4rem; }
    .cta-contact-label { font-family: 'JetBrains Mono', monospace; font-size: 0.625rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #a1a1aa; margin-bottom: 0.75rem; }
    .cta-contact-val { font-size: clamp(0.9rem,2vw,1.25rem); font-weight: 700; }
    .cta-contact-val a { transition: color 0.2s; }
    .cta-contact-val a:hover { color: #059669; }
    .cta-contact-val .sub { font-size: 0.625rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: #a1a1aa; }
    .cta-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn-primary { display: flex; align-items: center; justify-content: space-between; gap: 3rem; padding: 1.25rem 2.5rem; background: #000; color: #fff; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.3em; position: relative; overflow: hidden; transition: transform 0.1s; }
    .btn-primary::after { content: ''; position: absolute; inset: 0; background: #059669; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); }
    .btn-primary:hover::after { transform: translateY(0); }
    .btn-primary span, .btn-primary svg { position: relative; z-index: 1; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-secondary { display: flex; align-items: center; gap: 0.75rem; padding: 1.25rem 2.5rem; border: 2px solid #000; color: #000; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.3em; transition: background 0.2s, color 0.2s, transform 0.1s; }
    .btn-secondary:hover { background: #000; color: #fff; }
    .btn-secondary:active { transform: scale(0.97); }
    .btn-ghost { display: flex; align-items: center; gap: 0.75rem; padding: 1.25rem 2.5rem; border: 2px solid rgba(0,0,0,0.1); color: rgba(0,0,0,0.4); font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.3em; transition: border-color 0.2s, color 0.2s, transform 0.1s; }
    .btn-ghost:hover { border-color: #000; color: #000; }
    .btn-ghost:active { transform: scale(0.97); }

    /* FOOTER */
    footer { padding: 2.5rem 3rem; border-top: 1px solid var(--white5); display: flex; justify-content: space-between; align-items: center; opacity: 0.4; }
    footer .copy { font-family: 'JetBrains Mono', monospace; font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.2em; }
    footer .footer-links { display: flex; gap: 2rem; }
    footer .footer-links a { transition: color 0.2s; }
    footer .footer-links a:hover { color: #fff; }

    .fade-in { opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* MOBILE */
    @media (max-width: 768px) {
      body { border-width: 4px; }
      header { padding: 1rem 1.25rem; }
      nav { display: none; }
      .hero { padding: 3rem 1.25rem; }
      .hero-meta { grid-template-columns: 1fr; gap: 1.5rem; }
      .snapshot { grid-template-columns: 1fr 1fr; }
      .snapshot-card + .snapshot-card { border-left: none; }
      .snapshot-card:nth-child(2) { border-left: 1px solid var(--white5); }
      .snapshot-card:nth-child(3),.snapshot-card:nth-child(4) { border-top: 1px solid var(--white5); }
      .snapshot-card:nth-child(4) { border-left: 1px solid var(--white5); }
      .why-hire { padding: 3rem 1.25rem; }
      .why-grid { grid-template-columns: 1fr; gap: 2rem; }
      .experience,.projects { padding: 3rem 1.25rem; }
      .exp-grid { grid-template-columns: 1fr; }
      .impact-grid { grid-template-columns: 1fr; }
      .projects-grid { grid-template-columns: 1fr; }
      .bottom-grid { grid-template-columns: 1fr; }
      .edu-col { border-right: none; border-bottom: 1px solid var(--white5); }
      .skills-grid { grid-template-columns: 1fr 1fr; }
      .cta { padding: 3rem 1.25rem; }
      .cta-contacts { grid-template-columns: 1fr; gap: 2rem; }
      .cta-actions { flex-direction: column; }
      .btn-primary,.btn-secondary,.btn-ghost { justify-content: center; }
      footer { flex-direction: column; gap: 1.5rem; }
      .lang-btn { padding: 0.25rem 0.5rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">
      <h1>Kenn Keitaro</h1>
      <div class="status">
        <div class="pulse-dot"></div>
        <span class="status-text" data-i18n="status"></span>
      </div>
    </div>
    <div class="header-right">
      <nav>
        <a href="#experience" data-i18n="nav_exp"></a>
        <a href="#projects" data-i18n="nav_proj"></a>
        <a href="#skills" data-i18n="nav_skills"></a>
        <a href="https://www.linkedin.com/in/kenn-keitaro/" target="_blank" rel="noreferrer">LinkedIn</a>
      </nav>

      <!-- LANGUAGE SWITCHER -->
      <div class="lang-switcher" role="group" aria-label="Language">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="zh">繁中</button>
        <button class="lang-btn" data-lang="id">ID</button>
      </div>

      <a href="https://drive.google.com/file/d/1evG2ROi5ZuhJgwXQWDsuOmOOO5D-g7JO/view?usp=sharing" target="_blank" rel="noreferrer" class="btn-resume">
        <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>
        <span data-i18n="resume_btn"></span>
      </a>
    </div>
  </header>

  <main>

    <!-- HERO -->
    <section class="hero fade-in">
      <h2>
        <span data-i18n="hero_line1"></span><br>
        <span class="muted" data-i18n="hero_line2"></span>
      </h2>
      <div class="hero-meta">
        <div class="hero-meta-item">
          <p class="label" data-i18n="meta1_label"></p>
          <p class="value" data-i18n="meta1_val"></p>
        </div>
        <div class="hero-meta-item">
          <p class="label" data-i18n="meta2_label"></p>
          <p class="value" data-i18n="meta2_val"></p>
        </div>
        <div class="hero-meta-item">
          <p class="label" data-i18n="meta3_label"></p>
          <p class="value" data-i18n="meta3_val"></p>
        </div>
      </div>
    </section>

    <!-- SNAPSHOT -->
    <section class="snapshot fade-in">
      <div class="snapshot-card">
        <p class="tag" data-i18n="snap1_tag"></p>
        <p class="big" data-i18n="snap1_big"></p>
        <p class="sub" data-i18n="snap1_sub"></p>
      </div>
      <div class="snapshot-card">
        <p class="tag" data-i18n="snap2_tag"></p>
        <p class="big">60+</p>
        <p class="sub" data-i18n="snap2_sub"></p>
      </div>
      <div class="snapshot-card">
        <p class="tag" data-i18n="snap3_tag"></p>
        <p class="big">85%</p>
        <p class="sub" data-i18n="snap3_sub"></p>
      </div>
      <div class="snapshot-card">
        <p class="tag" data-i18n="snap4_tag"></p>
        <p class="big" data-i18n="snap4_big"></p>
        <p class="sub" data-i18n="snap4_sub"></p>
      </div>
    </section>

    <!-- WHY HIRE -->
    <section class="why-hire fade-in">
      <p class="section-eyebrow" data-i18n="why_eyebrow"></p>
      <div class="why-grid">
        <div class="why-item"><h4 data-i18n="why1_title"></h4><p data-i18n="why1_desc"></p></div>
        <div class="why-item"><h4 data-i18n="why2_title"></h4><p data-i18n="why2_desc"></p></div>
        <div class="why-item"><h4 data-i18n="why3_title"></h4><p data-i18n="why3_desc"></p></div>
        <div class="why-item"><h4 data-i18n="why4_title"></h4><p data-i18n="why4_desc"></p></div>
      </div>
    </section>

    <!-- EXPERIENCE -->
    <section id="experience" class="experience fade-in">
      <div class="section-header">
        <h2 class="section-title" data-i18n="exp_section_title"></h2>
      </div>
      <div class="exp-grid">
        <div class="exp-left">
          <h3>PwC Indonesia</h3>
          <p class="role" data-i18n="exp_role"></p>
          <p class="period">May 2023 – Jan 2026</p>
          <div class="tags">
            <span class="tag-pill" data-i18n="exp_tag1"></span>
            <span class="tag-pill" data-i18n="exp_tag2"></span>
            <span class="tag-pill" data-i18n="exp_tag3"></span>
          </div>
        </div>
        <div>
          <p class="exp-desc" data-i18n="exp_desc"></p>
          <div class="impact-grid">
            <div class="impact-item"><div class="impact-dot"></div><span data-i18n="exp_b1"></span></div>
            <div class="impact-item"><div class="impact-dot"></div><span data-i18n="exp_b2"></span></div>
            <div class="impact-item"><div class="impact-dot"></div><span data-i18n="exp_b3"></span></div>
            <div class="impact-item"><div class="impact-dot"></div><span data-i18n="exp_b4"></span></div>
          </div>
        </div>
      </div>
    </section>

    <!-- PROJECTS -->

    }
  };

  // ── SWITCHER LOGIC ────────────────────────────────────────
  let currentLang = localStorage.getItem('portfolio_lang') || 'en';

  function applyLang(lang) {
    const t = T[lang];
    if (!t) return;
    currentLang = lang;
    localStorage.setItem('portfolio_lang', lang);
    document.documentElement.lang = lang === 'zh' ? 'zh-TW' : lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      if (t[k] !== undefined) el.textContent = t[k];
    });
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => applyLang(btn.dataset.lang));
  });

  // ── INIT ──────────────────────────────────────────────────
  document.getElementById('year').textContent = new Date().getFullYear();
  applyLang(currentLang);

  const observer = new IntersectionObserver(entries => {
    entries.forEach(el => { if (el.isIntersecting) el.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
